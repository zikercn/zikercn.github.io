<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;pre&gt;&lt;code&gt;#include &amp;lt;iostream&amp;gt;
#include &amp;lt;vector&amp;gt;
#include &amp;lt;string&amp;gt;

using namespace std;

int main()
{
   vector&amp;lt;string&amp;gt; msg {&amp;quot;Hello&amp;quot;, &amp;quot;C++&amp;quot;, &amp;quot;World&amp;quot;, &amp;quot;from&amp;quot;, &amp;quot;VS Code&amp;quot;, &amp;quot;and the C++ extension!&amp;quot;};

      cout &amp;lt;&amp;lt; word &amp;lt;&amp;lt; &amp;quot; &amp;quot;;
   }
   cout &amp;lt;&amp;lt; endl;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;现在按&lt;code&gt;Ctrl + S&lt;/code&gt;保存文件。文件资源管理器视图（Ctrl + Shift + E）&lt;br&gt;
您还可以通过选中&lt;code&gt;文件&lt;/code&gt;主菜单中的&lt;code&gt;自动保存&lt;/code&gt;，启用&lt;code&gt;自动保存&lt;/code&gt;以自动保存文件更改。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lbqzlV.png&#34; alt=&#34;文件自动保存.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;

&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lbLXHe.png&#34; alt=&#34;自动补全感知.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;

9. 编译helloworld.cpp&lt;br&gt;
接下来，您将创建一个&lt;code&gt;tasks.json&lt;/code&gt;文件来告诉VS Code如何构建（编译）程序。该任务将调用g++编译器以基于源代码创建可执行文件。&lt;br&gt;
从主菜单中，选择&lt;code&gt;终端(Terminal) &amp;gt; 配置默认生成任务(Configure Default Build Task)&lt;/code&gt;。在下拉列表中，将显示任务下拉列表，其中列出了C ++编译器的各种预定义构建任务。选择&lt;code&gt;g++.exe build active file&lt;/code&gt;，该文件将构建编辑器中当前显示（活动）的文件。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lbXMid.png&#34; alt=&#34;配置默认生成任务.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lbjS6P.png&#34; alt=&#34;g++.exe构建活动文件.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
这将tasks.json在.vscode文件夹中创建一个文件，然后在编辑器中将其打开。&lt;br&gt;
您的新tasks.json文件应类似于以下JSON：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;{
// 有关 tasks.json 格式的文档，请参见
    // https://go.microsoft.com/fwlink/?LinkId=733558
    &amp;quot;version&amp;quot;: &amp;quot;2.0.0&amp;quot;,
    &amp;quot;tasks&amp;quot;: [
        {
            &amp;quot;type&amp;quot;: &amp;quot;shell&amp;quot;,
            &amp;quot;label&amp;quot;: &amp;quot;g++.exe build active file&amp;quot;,
            &amp;quot;command&amp;quot;: &amp;quot;C:\\mingw64\\bin\\g++.exe&amp;quot;,
            &amp;quot;args&amp;quot;: [
                &amp;quot;-g&amp;quot;,
                &amp;quot;${file}&amp;quot;,
                &amp;quot;-o&amp;quot;,
                &amp;quot;${fileDirname}\\${fileBasenameNoExtension}.exe&amp;quot;
            ],
            &amp;quot;options&amp;quot;: {
                &amp;quot;cwd&amp;quot;: &amp;quot;C:\\mingw64\\bin&amp;quot;
            },
            &amp;quot;problemMatcher&amp;quot;: [
                &amp;quot;$gcc&amp;quot;
            ],
            &amp;quot;group&amp;quot;: {
                &amp;quot;kind&amp;quot;: &amp;quot;build&amp;quot;,
                &amp;quot;isDefault&amp;quot;: true
            }
        }
    ]
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;该&lt;code&gt;command&lt;/code&gt;设置指定要运行的程序；在这种情况下是&lt;code&gt;g++&lt;/code&gt;。该&lt;code&gt;args&lt;/code&gt;数组指定将传递给g++的命令行参数。必须按照编译器期望的顺序指定这些参数。该任务告诉g ++获取活动文件（&lt;code&gt;${file}&lt;/code&gt;），对其进行编译，然后在当前目录（&lt;code&gt;${fileDirname}&lt;/code&gt;）中创建一个与活动文件同名但&lt;code&gt;.exe&lt;/code&gt;扩展名为（&lt;code&gt;${fileBasenameNoExtension}.exe&lt;/code&gt;）的可执行文件，&lt;code&gt;helloworld.exe&lt;/code&gt;以我们的示例为例。&lt;br&gt;
该&lt;code&gt;label&lt;/code&gt;值就是您将在任务列表中看到的值；您可以随意命名。&lt;br&gt;
对象中的&lt;code&gt;&amp;quot;isDefault&amp;quot;: true&lt;/code&gt;值&lt;code&gt;group&lt;/code&gt;指定当您按&lt;code&gt;Ctrl + Shift + B&lt;/code&gt;时将运行此任务。此属性仅出于方便起见；如果将其设置为&lt;code&gt;false&lt;/code&gt;，您仍然可以从“&lt;code&gt;终端&lt;/code&gt;”菜单中使用&lt;code&gt;运行生成任务&lt;/code&gt;来运行它。&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;运行构建&lt;/li&gt;
&lt;/ol&gt;
&lt;ul&gt;
&lt;li&gt;1.回到&lt;code&gt;helloworld.cpp&lt;/code&gt;。您的任务将生成活动文件，并且您要生成&lt;code&gt;helloworld.cpp&lt;/code&gt;。&lt;/li&gt;
&lt;li&gt;2.要运行中定义的构建任务&lt;code&gt;tasks.json&lt;/code&gt;，请按&lt;code&gt;Ctrl + Shift + B&lt;/code&gt;或从&lt;code&gt;终端&lt;/code&gt;主菜单中选择&lt;code&gt;运行生成任务&lt;/code&gt;。&lt;/li&gt;
&lt;li&gt;3.任务开始时，您应该看到“集成终端”面板出现在源代码编辑器下方。任务完成后，终端将显示编译器的输出，指示构建成功还是失败。对于成功的g ++构建，输出如下所示：&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lqSAbV.png&#34; alt=&#34;集成终端指示构建成功还是失败.png&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;4.使用+按钮创建一个新终端，您将拥有一个新终端（运行PowerShell），并将该&lt;code&gt;helloworld&lt;/code&gt;文件夹作为工作目录。运行&lt;code&gt;dir&lt;/code&gt;，您现在应该看到可执行文件&lt;code&gt;helloworld.exe&lt;/code&gt;。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lqnz5j.png&#34; alt=&#34;终端运行.helloworld.png&#34; loading=&#34;lazy&#34;&gt;&lt;/li&gt;
&lt;li&gt;5.您可以&lt;code&gt;helloworld&lt;/code&gt;在终端中输入来运行&lt;code&gt;.\helloworld.exe&lt;/code&gt;。&lt;/li&gt;
&lt;/ul&gt;
&lt;ol&gt;
&lt;li&gt;修改task.json&lt;br&gt;
您可以&lt;code&gt;tasks.json&lt;/code&gt;使用&lt;code&gt;&amp;quot;${workspaceFolder}\\*.cpp&amp;quot;&lt;/code&gt;代替的参数来修改以构建多个C ++文件&lt;code&gt;${file}&lt;/code&gt;。这将生成&lt;code&gt;.cpp&lt;/code&gt;当前文件夹中的所有文件。您也可以通过替换&lt;code&gt;&amp;quot;${fileDirname}\\${fileBasenameNoExtension}.exe&amp;quot;&lt;/code&gt;为硬编码的文件名（例如&lt;code&gt;&amp;quot;${workspaceFolder}\\myProgram.exe&amp;quot;&lt;/code&gt;）来修改输出文件名。&lt;/li&gt;
&lt;li&gt;调试helloworld.cpp&lt;br&gt;
接下来，您将创建一个&lt;code&gt;launch.json&lt;/code&gt;文件来配置VS Code，以在您按&lt;code&gt;F5&lt;/code&gt;调试程序时启动&lt;code&gt;GDB调试器&lt;/code&gt;。从主菜单中，选择&lt;code&gt;调试&lt;/code&gt;&amp;gt;&lt;code&gt;添加配置...&lt;/code&gt;，然后选择&lt;code&gt;C++(GDB/LLDB)&lt;/code&gt;。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lqu4yV.png&#34; alt=&#34;调试 添加配置.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lqKSeO.png&#34; alt=&#34;C++(GDB/LLDB).png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
然后，您将看到各种预定义调试配置的下拉列表。选择&lt;code&gt;g++.exe build and debug active file&lt;/code&gt;。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lqKQYj.png&#34; alt=&#34;g++.exe构建并调试活动文件.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
VS Code创建一个&lt;code&gt;launch.json&lt;/code&gt;文件，在编辑器中将其打开，然后生成并运行“ helloworld”。&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code&gt;{
    // 使用 IntelliSense 了解相关属性。 
    // 悬停以查看现有属性的描述。
    // 欲了解更多信息，请访问: https://go.microsoft.com/fwlink/?linkid=830387
    &amp;quot;version&amp;quot;: &amp;quot;0.2.0&amp;quot;,
    &amp;quot;configurations&amp;quot;: [
        {
            &amp;quot;name&amp;quot;: &amp;quot;g++.exe build and debug active file&amp;quot;,
            &amp;quot;type&amp;quot;: &amp;quot;cppdbg&amp;quot;,
            &amp;quot;request&amp;quot;: &amp;quot;launch&amp;quot;,
            &amp;quot;program&amp;quot;: &amp;quot;${fileDirname}\\${fileBasenameNoExtension}.exe&amp;quot;,
            &amp;quot;args&amp;quot;: [],
            &amp;quot;stopAtEntry&amp;quot;: false,
            &amp;quot;cwd&amp;quot;: &amp;quot;${workspaceFolder}&amp;quot;,
            &amp;quot;environment&amp;quot;: [],
            &amp;quot;externalConsole&amp;quot;: false,
            &amp;quot;MIMode&amp;quot;: &amp;quot;gdb&amp;quot;,
            &amp;quot;miDebuggerPath&amp;quot;: &amp;quot;C:\\mingw64\\bin\\gdb.exe&amp;quot;,
            &amp;quot;setupCommands&amp;quot;: [
                {
                    &amp;quot;description&amp;quot;: &amp;quot;为 gdb 启用整齐打印&amp;quot;,
                    &amp;quot;text&amp;quot;: &amp;quot;-enable-pretty-printing&amp;quot;,
                    &amp;quot;ignoreFailures&amp;quot;: true
                }
            ],
            &amp;quot;preLaunchTask&amp;quot;: &amp;quot;g++.exe build active file&amp;quot;
        }
    ]
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;该&lt;code&gt;program&lt;/code&gt;设置指定要调试的程序。在这里，它被设置为活动文件文件夹&lt;code&gt;${fileDirname}&lt;/code&gt;和&lt;code&gt;.exe&lt;/code&gt;扩展名的活动文件名&lt;code&gt;${fileBasenameNoExtension}.exe&lt;/code&gt;，如果&lt;code&gt;helloworld.cpp&lt;/code&gt;是，则为活动文件&lt;code&gt;helloworld.exe&lt;/code&gt;。&lt;br&gt;
默认情况下，C ++扩展名不会在源代码中添加任何断点，并且其&lt;code&gt;stopAtEntry&lt;/code&gt;值设置为&lt;code&gt;false&lt;/code&gt;。将&lt;code&gt;stopAtEntry&lt;/code&gt;值更改&lt;code&gt;true&lt;/code&gt;为会导致调试器&lt;code&gt;main&lt;/code&gt;在启动调试时在该方法上停止。&lt;br&gt;
13. 开始调试会话&lt;br&gt;
回到&lt;code&gt;helloworld.cpp&lt;/code&gt;它是活动文件。&lt;br&gt;
按&lt;code&gt;F5&lt;/code&gt;或从主菜单中选择&lt;code&gt;调试&lt;/code&gt;&amp;gt;&lt;code&gt;启动调试&lt;/code&gt;。在开始浏览源代码之前，让我们花一点时间注意用户界面中的一些更改：&lt;br&gt;
集成终端出现在源代码编辑器的底部。在&lt;code&gt;调试输出&lt;/code&gt;选项卡中，您将看到指示调试器已启动并正在运行的输出。&lt;br&gt;
编辑器突出显示方法中的第一条语句&lt;code&gt;main&lt;/code&gt;。这是C ++扩展自动为您设置的断点：&lt;br&gt;
左侧的“调试”视图显示调试信息。您将在本教程的后面看到一个示例。&lt;/p&gt;
&lt;p&gt;在代码编辑器的顶部，将显示一个调试控制面板。您可以通过抓住左侧的点在屏幕上移动它。&lt;/p&gt;
&lt;p&gt;14.C/C++配置&lt;br&gt;
如果要对C / C ++扩展进行更多控制，可以创建一个&lt;code&gt;c_cpp_properties.json&lt;/code&gt;文件，该文件将允许您更改设置，例如编译器的路径，包含路径，C ++标准（默认为C ++ 17）等。&lt;/p&gt;
&lt;p&gt;您可以从命令面板（Ctrl + Shift + P）编辑配置（UI）通过运行命令&lt;code&gt;C/C++: 编辑配置(UI) C/C++: Edit configurations(UI)&lt;/code&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lq1e3j.png&#34; alt=&#34;C/C++: 编辑配置(UI).png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
这将打开&lt;code&gt;C/ C++配置&lt;/code&gt;页面。当您在此处进行更改时，VS Code会将其写入到文件夹中称为&lt;code&gt;c_cpp_properties.json&lt;/code&gt;的&lt;code&gt;.vscode&lt;/code&gt;文件中。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/14/lq3ks1.png&#34; alt=&#34;C/C++配置页面.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
Visual Studio Code将这些设置放在中.vscode\c_cpp_properties.json。如果直接打开该文件，则它应如下所示：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;{
    &amp;quot;configurations&amp;quot;: [
        {
            &amp;quot;name&amp;quot;: &amp;quot;Win32&amp;quot;,
            &amp;quot;includePath&amp;quot;: [
                &amp;quot;${workspaceFolder}/**&amp;quot;
            ],
            &amp;quot;defines&amp;quot;: [
                &amp;quot;_DEBUG&amp;quot;,
                &amp;quot;UNICODE&amp;quot;,
                &amp;quot;_UNICODE&amp;quot;
            ],
            &amp;quot;compilerPath&amp;quot;: &amp;quot;C:\\mingw64\\bin\\gcc.exe&amp;quot;,
            &amp;quot;cStandard&amp;quot;: &amp;quot;c11&amp;quot;,
            &amp;quot;cppStandard&amp;quot;: &amp;quot;c++17&amp;quot;,
            &amp;quot;intelliSenseMode&amp;quot;: &amp;quot;clang-x64&amp;quot;
        }
    ],
    &amp;quot;version&amp;quot;: 4
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;仅当程序包含不在工作空间或标准库路径中的头文件时，才需要添加到&lt;code&gt;包含路径数组&lt;/code&gt;设置中。&lt;br&gt;
15.编译路径&lt;br&gt;
该&lt;code&gt;compilerPath&lt;/code&gt;设置是您配置中的重要设置。该扩展使用它来推断C ++标准库头文件的路径。当扩展知道在哪里可以找到那些文件时，它可以提供有用的功能，例如智能补全和&lt;code&gt;转到定义&lt;/code&gt;导航。&lt;br&gt;
C/C++扩展尝试&lt;code&gt;compilerPath&lt;/code&gt;根据其在系统上找到的内容来使用默认的编译器位置进行填充。该扩展在几个常见的编译器位置中查找。&lt;br&gt;
该&lt;code&gt;compilerPath&lt;/code&gt;搜索顺序是：&lt;br&gt;
首先检查Microsoft Visual C ++编译器&lt;br&gt;
然后在Windows Subsystem for Linux（WSL）上寻找g ++&lt;br&gt;
然后用g ++编写Mingw-w64。&lt;br&gt;
如果安装了Visual Studio或WSL，则可能需要进行更改compilerPath以匹配项目的首选编译器。例如，如果使用Win32线程和SEH异常处理选项在C:\mingw64下安装Mingw-w64版本8.1.0，则路径如下所示：&lt;code&gt;C:\\mingw64\\bin\\g++.exe&lt;/code&gt;&lt;/p&gt;

      <div class="item">
        <a class="result-title" href="https://zikercn.github.io/post/SDL-Library-Simple-DirectMedia-Layer/"" data-c="
          &lt;p&gt;Simple DirectMedia Layer是一个跨平台开发库，旨在通过OpenGL和Direct3D提供对音频，键盘，鼠标，操纵杆和图形硬件的低级访问。视频播放软件，仿真器和受欢迎的游戏（包括Valve屡获殊荣的目录和许多Humble Bundle游戏）都使用它。&lt;/p&gt;
&lt;!-- more --&gt;
&lt;p&gt;SDL官网: &lt;a href=&#34;https://www.libsdl.org/&#34;&gt;https://www.libsdl.org/&lt;/a&gt;&lt;br&gt;
下载开发库:&lt;br&gt;
Windows：&lt;br&gt;
&lt;a href=&#34;https://www.libsdl.org/release/SDL2-devel-2.0.10-VC.zip&#34;&gt;SDL2-devel-2.0.10-VC.zip&lt;/a&gt;（Visual C ++ 32/64位）&lt;br&gt;
&lt;a href=&#34;https://www.libsdl.org/release/SDL2-devel-2.0.10-mingw.tar.gz&#34;&gt;SDL2-devel-2.0.10-mingw.tar.gz&lt;/a&gt;（&lt;a href=&#34;http://mingw-w64.sourceforge.net/&#34;&gt;MinGW&lt;/a&gt; 32/64位）&lt;/p&gt;
&lt;h1 id=&#34;windows-visual-studio-2019-中配置sdl&#34;&gt;Windows Visual Studio 2019 中配置SDL&lt;/h1&gt;
&lt;p&gt;1.下载好&lt;code&gt;SDL2-devel-2.0.10-VC&lt;/code&gt;,解压到固定目录下(如:E:\CLibrary\SDL2\SDL2-VC)&lt;br&gt;
2.打开Visual Studio，新建一个控制台空项目,新建一个.cpp源文件&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/louI1O.png&#34; alt=&#34;Visual Studio控制台空项目.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
3.配置SDL环境:在解决方案管理器中右键项目名称,选择属性&lt;br&gt;
4.在&lt;code&gt;C/C++ -&amp;gt;常规-&amp;gt;附加包含目录&lt;/code&gt;中添加SDL2文件夹下的&lt;code&gt;include文件夹&lt;/code&gt;,确认,应用&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/loeASg.png&#34; alt=&#34;CC++ -常规-附加包含目录.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
5.在&lt;code&gt;链接器-&amp;gt;常规-&amp;gt;附加库目录&lt;/code&gt;中添加SDL2文件夹下的&lt;code&gt;lib\x86文件夹&lt;/code&gt;（因为此时活动平台为32位，所以选择x86。如果需要使用64位，则选择”lib\x64”文件夹）&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/loe59S.png&#34; alt=&#34;链接器-常规-附加库目录.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
6.在&lt;code&gt;链接器-&amp;gt;输入-&amp;gt;附加依赖项&lt;/code&gt;中添加&lt;code&gt;SDL2.lib和SDL2main.lib&lt;/code&gt;,中间用英文分号或回车间隔&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/lomZ9O.png&#34; alt=&#34;链接器-输入-附加依赖项.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
7.将&lt;code&gt;lib\x86文件夹&lt;/code&gt;下&lt;code&gt;SDL2.dll&lt;/code&gt;复制到工程跟目录与.cpp文件同一目录中&lt;br&gt;
同样要注意x86和x64要分别对应，如果是配置x64平台则复制粘贴”lib\x64”下的SDL2.dll。此处选择x86：&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/lomDU0.png&#34; alt=&#34;SDL2.dll复制到工程跟目录.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
8.测试SDL2配置环境:&lt;br&gt;
&lt;code&gt;//注意:SDL环境需要main函数有输入的参数（即使用不到）&lt;/code&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/logOyT.png&#34; alt=&#34;测试SDL2配置环境.png&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;#include &amp;lt;stdio.h&amp;gt;
#include &amp;quot;SDL.h&amp;quot;
//注意:SDL环境需要main函数有输入的参数（即使用不到）
int main(int argc, char* argv[])
{
    SDL_Init(SDL_INIT_VIDEO); 
    SDL_Window* window = SDL_CreateWindow(&amp;quot;SDL2&amp;quot;, 100, 100, 640, 480, SDL_WINDOW_OPENGL);
    if (window == NULL)
    {
        printf(&amp;quot;Could not create window: %s\n&amp;quot;, SDL_GetError());
        return 1;
    }
    SDL_Delay(5000);
    SDL_DestroyWindow(window);
    SDL_Quit();
    return 0;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h1 id=&#34;windows-mingw-codeblocks-中配置sdl&#34;&gt;Windows MinGW CodeBlocks 中配置SDL&lt;/h1&gt;
&lt;p&gt;1.下载好&lt;code&gt;SDL2-devel-2.0.10-mingw&lt;/code&gt;,解压到固定目录下(如:E:\CLibrary\SDL2\SDL2-mingw)&lt;br&gt;
2.打开CodeBlocks，新建一个控制台空项目,自带一个main.cpp源文件&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2020/01/12/lobNAx.png&#34; alt=&#34;CodeBlocks控制台空项目.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;

&lt;pre&gt;&lt;code&gt;#include &amp;lt;stdio.h&amp;gt;
#include &amp;lt;SDL.h&amp;gt;

          &lt;pre&gt;&lt;code&gt;#include &amp;lt;Windows.h&amp;gt;
#include &amp;quot;resource.h&amp;quot;
// 出现在应用程序标题栏中的字符串.
static TCHAR szTitle[] = TEXT(&amp;quot;资源测试&amp;quot;);
static TCHAR szWindowClass[] = TEXT(&amp;quot;WindowsDesktop&amp;quot;);//全局窗口类前置声明
HINSTANCE hInst;//全局实例句柄前置声明
LRESULT CALLBACK WndProc(HWND, UINT, WPARAM, LPARAM);//窗口过程函数前置声明
//********************程序入口********************
int CALLBACK WinMain(
	_In_ HINSTANCE hInstance,
	_In_opt_ HINSTANCE hPrevInstance,
	_In_ LPSTR     lpCmdLine,
	_In_ int       nCmdShow)
{
	WNDCLASSEX wcex;//窗口类

	wcex.cbSize = sizeof(WNDCLASSEX);
	wcex.style = CS_HREDRAW | CS_VREDRAW;//水平垂直变化时重绘窗口
	wcex.lpfnWndProc = WndProc;//窗口过程
	wcex.cbClsExtra = 0;
	wcex.cbWndExtra = 0;
	wcex.hInstance = hInstance;//实例句柄,入口函数传入
	wcex.hIcon = LoadIcon(hInstance, MAKEINTRESOURCE(IDI_ICON1));//图标
	wcex.hCursor = LoadCursor(hInstance, MAKEINTRESOURCE(IDC_CURSOR1));//光标
	wcex.hbrBackground = (HBRUSH)(COLOR_WINDOW + 1);//背景色
	wcex.lpszMenuName = NULL;
	wcex.lpszClassName = szWindowClass;	//窗口类的名字
	wcex.hIconSm = LoadIcon(wcex.hInstance, IDI_APPLICATION);
	if (!RegisterClassEx(&amp;amp;wcex))
	{
		MessageBox(NULL,
			TEXT(&amp;quot;调用RegisterClassEx失败!&amp;quot;),	//窗口类注册失败弹窗提示内容
			TEXT(&amp;quot;Windows桌面指南&amp;quot;),	//注册失败弹窗标题
			NULL);

		return 1;
	}

//********************创建窗口********************
	HWND hWnd = CreateWindow(
		szWindowClass,			//窗口类的名字,说明基于哪个窗口类
		szTitle,				//窗口标题,在顶部定义szTitle
		WS_OVERLAPPEDWINDOW,	//窗口样式
		CW_USEDEFAULT, CW_USEDEFAULT, //窗口距离屏幕左上角距离x,y
		500, 400,				//窗口长度x,高度y
		NULL,					//父窗口句柄
		NULL,					//窗口菜单句柄
		hInstance,				//程序实例句柄
		NULL					//
	);
	if (!hWnd)
	{
		MessageBox(NULL,
			TEXT(&amp;quot;调用CreateWindow失败!&amp;quot;),
			TEXT(&amp;quot;Windows桌面指南&amp;quot;),
			NULL);
		return 1;
	}
	// ShowWindow的参数说明:
	// hWnd: 从CreateWindow返回的值
	// nCmdShow: 来自WinMain的第四个参数
	ShowWindow(hWnd,	//显示指定窗口,传句柄
		nCmdShow);		//怎么显示,最大化最小化显示等
	UpdateWindow(hWnd);	//更新指定窗口的客户区

	// 主消息循环:
	MSG msg;
	while (GetMessage(&amp;amp;msg, NULL, 0, 0))	//消息队列
	{
		TranslateMessage(&amp;amp;msg);	//转换
		DispatchMessage(&amp;amp;msg);	//分发
	}
	return (int)msg.wParam;	//WM_QUIT
}

//********************窗口过程********************
LRESULT CALLBACK WndProc(HWND hWnd, UINT message, WPARAM wParam, LPARAM lParam)
{
	PAINTSTRUCT ps;
	HDC hdc;
	switch (message)
	{
	case WM_PAINT:	//窗口必须重绘的时候
		hdc = BeginPaint(hWnd, &amp;amp;ps);//返回:设备描述表句柄
		// TODO: 在此处添加使用 hdc 的任何绘图代码...
		Rectangle(hdc, 5, 5, 480, 355);	//矩形

	case WM_DESTROY:	//消息销毁结束的时候
		PostQuitMessage(0);
		break;
	default:
		return DefWindowProc(hWnd, message, wParam, lParam);
		break;
	}
}

          &lt;p&gt;用GCC编译C程序,不建议单独安装MinGW,建议安装CodeBlocks里面已经包含MinGW,而且CodeBlocks很不错.&lt;br&gt;

&lt;ol&gt;
&lt;li&gt;汉化包下载完成后，是一个压缩包，将其解压，其中包含有一个 locale 文件夹里面有个 zh_CN 文件夹,复制到&lt;code&gt;D:\Program Files\CodeBlocks\share\CodeBlocks\locale&lt;/code&gt;目录&lt;br&gt;

&lt;li&gt;选择 View 选项，勾选 Internationalization 选项，同时选择其中的 Chinese(Simplified)。然后点击 OK 按钮。&lt;br&gt;
设置完成后，直接重新启动 CodeBlocks，此时 CodeBlocks 会出现一个提示框，提示你是否保存更改，选择保存即可。&lt;br&gt;
再次启动 CodeBlocks，你会看到全新的汉化的 CodeBlocks，虽然没有完全汉化，但起码不会影响日常的正常使用。&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;MinGW&lt;/strong&gt;: D:\Program Files\CodeBlocks\MinGW&lt;br&gt;
配置环境变量:Path D:\Program Files\CodeBlocks\MinGW\bin&lt;/p&gt;

&lt;p&gt;2.运行可执行文件&lt;br&gt;

      <div class="item">
        <a class="result-title" href="https://zikercn.github.io/post/Win10-Visual-Studio-MSVC-CL-C-C++/"" data-c="
          &lt;p&gt;&lt;strong&gt;1.工具介绍&lt;/strong&gt;&lt;br&gt;
Windows下VS套件自带的编译程序有以下这些：&lt;br&gt;
cl.exe：编译程序&lt;br&gt;
link.exe：链接程序&lt;br&gt;
lib.exe：加载lib库的程序&lt;br&gt;
nmake.exe：用Makefile进行构建、编译的工具&lt;br&gt;
&lt;strong&gt;2.cl使用方法&lt;/strong&gt;&lt;br&gt;
用法: cl [ 选项... ] 文件名... [ /link 链接选项... ]&lt;br&gt;
1.设置Path环境变量：&lt;code&gt;bin&lt;/code&gt;目录cl.exe所在路径路径&lt;br&gt;
D:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC\14.23.28105\bin\Hostx86\x86;&lt;br&gt;
D:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build;&lt;br&gt;
D:\Program Files\Microsoft Visual Studio\2019\Enterprise\Common7\IDE;&lt;br&gt;
D:\Windows Kits\10\Include\10.0.18362.0\ucrt;&lt;br&gt;
2.新建&lt;code&gt;include&lt;/code&gt;环境变量，设置头文件路径：&lt;br&gt;
D:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC\14.23.28105\include;&lt;br&gt;
D:\Windows Kits\10\Include\10.0.18362.0\ucrt;&lt;br&gt;
3.新建&lt;code&gt;lib&lt;/code&gt;环境变量，设置头文件路径：&lt;br&gt;
D:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC\14.23.28105\lib\x86;&lt;br&gt;
D:\Windows Kits\10\Lib\10.0.18362.0\ucrt\x86;&lt;br&gt;
C:\Program Files (x86)\Microsoft SDKs\UWPNuGetPackages\runtime.win10-arm64.microsoft.net.native.compiler\2.2.7-rel-27913-00\tools\arm64\ilc\tools\link&lt;br&gt;
完成三步骤，Windows命令行C++编译环境配置成功。&lt;br&gt;
注:lib目录还需要&lt;code&gt;uuid.lib&lt;/code&gt;,&lt;code&gt;kernel32.lib&lt;/code&gt;两个文件,VS2019以前在类似&lt;br&gt;
&lt;code&gt;C:\Program Files (x86)\Microsoft SDKs\Windows\v7.1A\Lib&lt;/code&gt;&lt;br&gt;
VS2019已经找不到这个目录,所以我们就到&lt;code&gt;C:\Program Files (x86)\Microsoft SDKs\&lt;/code&gt;目录手动搜索&lt;code&gt;uuid.lib&lt;/code&gt;文件名,找到后打开这个文件夹,路径添加到lib环境变量中.&lt;br&gt;
&lt;strong&gt;3.Windows不重启就使环境变量修改生效&lt;/strong&gt;&lt;br&gt;
在“我的电脑”-&amp;gt;“属性”-&amp;gt;“高级”-&amp;gt;“环境变量”中增加或修改环境变量后，需重启系统才能使之生效。有没有什么方法可让它即时生效呢？下面介绍一种方法：&lt;/p&gt;
&lt;p&gt;以修改环境变量“PATH”为例，修改完成后，进入DOS命令提示符，输入：set PATH=C: ，关闭DOS窗口。再次打开DOS窗口，输入：echo %PATH% ，可以发现“我的电脑”-&amp;gt;“属性”-&amp;gt;“高级”-&amp;gt;“环境变量”中设置的 PATH 值已经生效。&lt;/p&gt;
&lt;p&gt;不用担心DOS窗口中的修改会影响环境变量的值，DOS窗口中的环境变量只是Windows环境变量的一个副本而已。但是对副本的修改却会引发Windows环境变量的刷新，这正是我们想要的！&lt;/p&gt;
&lt;p&gt;5.测试编写hello.cpp代码如下：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;#include &amp;lt;stdio.h&amp;gt;
#include &amp;lt;iostream&amp;gt;
 
int main(){
	printf(&amp;quot;hello world&amp;quot;);
	return 0;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;6.CMD执行命令&lt;/strong&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;cl.exe hello.cpp
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;7.Makefile的编写和nmake使用方法&lt;/strong&gt;&lt;br&gt;
编写Makefile：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# Specify compiler
CC=cl.exe
  
.PHONY : all
all : hello-world.exe
  
hello-world.exe : hello-world.cpp
	$(CC)  hello-world.cpp
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;8.运行nmake:&lt;/strong&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;E:\C\Hello&amp;gt;nmake
&lt;/code&gt;&lt;/pre&gt;
">Win10下使用VS2019自带的MSVC CL命令行编译C/C++程序</a>

&lt;p&gt;下载批处理bat,自动设置&lt;br&gt;
&lt;a href=&#34;https://www.lanzous.com/i6u747e&#34;&gt;Var.bat&lt;/a&gt;&lt;br&gt;
下载 &lt;strong&gt;NMAKE&lt;/strong&gt;&lt;br&gt;
&lt;a href=&#34;https://www.lanzous.com/i6u73hi&#34;&gt;nmake.exe&lt;/a&gt;&lt;br&gt;
也可以到 &lt;strong&gt;Visual Studio 2019&lt;/strong&gt; 本地安装目录中找到&lt;br&gt;
&lt;code&gt;D:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Tools\MSVC\14.23.28105\bin\Hostx86\x86&lt;/code&gt;&lt;br&gt;
将&lt;code&gt;nmake.exe&lt;/code&gt;复制到&lt;code&gt;C:\masm32\bin&lt;/code&gt;目录即可&lt;br&gt;
Makefile&lt;br&gt;
下载&lt;a href=&#34;https://www.lanzous.com/i6u75ha&#34;&gt;Makefile&lt;/a&gt;文件模板&lt;br&gt;
在含有&lt;code&gt;Makefile&lt;/code&gt;的编译目录CMD &lt;code&gt;&amp;gt;nmake&lt;/code&gt; 即可完成编译&lt;br&gt;
Makefile文件一般格式:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;EXE = Test.exe		#指定输出文件
OBJS = Test.obj		#需要的目标文件
RES = Test.res		#需要的资源文件

LINK_FLAG = /subsystem:windows	#连接选项
ML_FLAG = /c /coff		#编译选项

$(EXE): $(OBJS) $(RES)
	Link $(LINK_FLAG) $(OBJS) $(RES)

.asm.obj:
	ml $(ML_FLAG) $&amp;lt;
.rc.res:
	rc $&amp;lt;

clean:
	del *.obj
	del *.res

&lt;/code&gt;&lt;/pre&gt;

      <div class="item">
        <a class="result-title" href="https://zikercn.github.io/post/hexo-jing-tai-bo-ke-ben-di-bu-shu/"" data-c="
          &lt;p&gt;Hexo官网：&lt;a href=&#34;https://hexo.io/zh-cn/&#34;&gt;https://hexo.io/zh-cn/&lt;/a&gt;&lt;br&gt;
Hexo依赖于Node.js：&lt;a href=&#34;https://nodejs.org/&#34;&gt;https://nodejs.org/&lt;/a&gt;下载并安装好&lt;br&gt;
云部署需要Git：&lt;a href=&#34;https://git-scm.com/&#34;&gt;https://git-scm.com/&lt;/a&gt;下载并安装好&lt;br&gt;
&lt;a href=&#34;https://github.com/zhuzhuyule/HexoEditor&#34;&gt;HexoEditor&lt;/a&gt;&lt;/p&gt;
&lt;h3 id=&#34;安装hexo到本地部署&#34;&gt;安装Hexo到本地部署&lt;/h3&gt;
&lt;p&gt;在你想放博客的文件夹右键打开&lt;code&gt;Git Bash&lt;/code&gt;,粘贴下面的文本，安装&lt;br&gt;
&lt;code&gt;$ npm install hexo-cli -g&lt;/code&gt;&lt;br&gt;
PS:如果下载速度慢可以先设置一个国内&lt;code&gt;cnpm&lt;/code&gt;镜像，执行：&lt;br&gt;
&lt;code&gt;npm install -g cnpm --registry=http://registry.npm.taobao.org&lt;/code&gt;&lt;br&gt;
然后安装hexo，相应的&lt;code&gt;npm&lt;/code&gt;也要换成&lt;code&gt;cnpm&lt;/code&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCqEWD.jpg&#34; alt=&#34;eCqEWD.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
安装 Hexo 完成后，请执行下列&lt;a href=&#34;https://hexo.io/zh-cn/docs/commands&#34;&gt;命令&lt;/a&gt;，Hexo 将会在指定文件夹中新建所需要的文件。&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;$ hexo init &amp;lt;folder&amp;gt;
$ cd &amp;lt;folder&amp;gt;
$ npm install
$ hexo server
INFO  Start processing
INFO  Hexo is running at http://localhost:4000 . Press Ctrl+C to stop.
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/ePKwHs.md.jpg&#34; alt=&#34;ePKwHs.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
新建完成后，指定文件夹的目录如下：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;.
├── _config.yml
├── package.json
├── scaffolds
├── source
|   ├── _drafts
|   └── _posts
└── themes
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;config.yml&lt;/strong&gt;&lt;br&gt;
网站的 &lt;a href=&#34;https://hexo.io/zh-cn/docs/configuration&#34;&gt;配置&lt;/a&gt; 信息，您可以在此配置大部分的参数。&lt;br&gt;
&lt;strong&gt;package.json&lt;/strong&gt;&lt;br&gt;
应用程序的信息。EJS, Stylus 和 Markdown renderer 已默认安装，您可以自由移除。&lt;br&gt;
&lt;strong&gt;scaffolds&lt;/strong&gt;&lt;br&gt;
模版 文件夹。当您新建文章时，Hexo 会根据 scaffold 来建立文件。&lt;br&gt;
&lt;strong&gt;source&lt;/strong&gt;&lt;br&gt;
资源文件夹是存放用户资源的地方。除 posts 文件夹之外，开头命名为  (下划线)的文件 / 文件夹和隐藏的文件将会被忽略。Markdown 和 HTML 文件会被解析并放到 public 文件夹，而其他文件会被拷贝过去。&lt;br&gt;
&lt;strong&gt;themes&lt;/strong&gt;&lt;br&gt;
主题 文件夹。Hexo 会根据主题来生成静态页面。&lt;/p&gt;
&lt;h3 id=&#34;云部署准备-git配置&#34;&gt;云部署准备-Git配置&lt;/h3&gt;
&lt;p&gt;打开&lt;code&gt;Git Bash&lt;/code&gt;&lt;br&gt;
&lt;code&gt;$ git config --global user.name &amp;quot;zikercn&amp;quot;&lt;/code&gt;&lt;br&gt;
&lt;code&gt;$ git config --global user.email &amp;quot;zikercn@gmail.com&amp;quot;&lt;/code&gt;&lt;/p&gt;
&lt;h3 id=&#34;云部署准备-github仓库创建&#34;&gt;云部署准备-Github仓库创建&lt;/h3&gt;
&lt;p&gt;在Github上创建Pages仓库&lt;br&gt;
点击右上角的&lt;strong&gt;＋&lt;/strong&gt; 选择&lt;a href=&#34;https://github.com/new&#34;&gt; New repository&lt;/a&gt;，&lt;br&gt;
仓库名取固定格式&lt;code&gt;你的用户名.github.io&lt;/code&gt;,其他不变，点&lt;strong&gt;Create repository&lt;/strong&gt;创建&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCDLcQ.jpg&#34; alt=&#34;eCDLcQ.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
复制SSH地址：&lt;code&gt;git@github.com:zikercn/zikercn.github.io.git&lt;/code&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/ePMTds.jpg&#34; alt=&#34;ePMTds.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h3 id=&#34;云部署准备-ssh秘钥配置&#34;&gt;云部署准备-SSH秘钥配置&lt;/h3&gt;
&lt;h4 id=&#34;本地生成ssh-key&#34;&gt;本地生成&lt;strong&gt;SSH key&lt;/strong&gt;:&lt;/h4&gt;
&lt;p&gt;1.打开&lt;code&gt;Git Bash&lt;/code&gt;,粘贴下面的文本，替换您的GitHub电子邮件地址。&lt;br&gt;
&lt;code&gt;$ ssh-keygen -t rsa -b 4096 -C &amp;quot;zikercn@gmail.com&amp;quot;&lt;/code&gt;&lt;br&gt;
连续回车即可，这将使用提供的电子邮件作为标签创建一个新的ssh密钥。&lt;br&gt;
秘钥保存位置在：&lt;code&gt;/Users/ZHM/.ssh/id_rsa&lt;/code&gt;文件夹内&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eC2vxf.jpg&#34; alt=&#34;eC2vxf.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;$ cd ~/.ssh
$ ls
id_rsa  id_rsa.pub
id_rsa 为私钥  id_rsa.pub 为公钥
$ cat id_rsa.pub 查看公钥内容并复制
&lt;/code&gt;&lt;/pre&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCfvxx.jpg&#34; alt=&#34;eCfvxx.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h4 id=&#34;把生成的公钥添加到github账户&#34;&gt;把生成的公钥添加到Github账户：&lt;/h4&gt;
&lt;p&gt;点击右上角的头像，选择&lt;a href=&#34;https://github.com/settings/profile&#34;&gt;Settings&lt;/a&gt;，在左侧选择&lt;a href=&#34;https://github.com/settings/keys&#34;&gt;SSH and GPG keys&lt;/a&gt;，这里就是管理SSH秘钥的地方，一台机器对应一个秘钥keys。&lt;br&gt;
点击&lt;a href=&#34;https://github.com/settings/ssh/new&#34;&gt;New SSH key&lt;/a&gt;添加公钥&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eChMdg.jpg&#34; alt=&#34;eChMdg.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eChfTe.jpg&#34; alt=&#34;eChfTe.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
测试&lt;br&gt;
&lt;code&gt;ssh git@github.com&lt;/code&gt;&lt;br&gt;
第一次提示连接确认输入&lt;code&gt;yes&lt;/code&gt;回车，当显示下面的语句就表示连接成功了&lt;br&gt;
&lt;code&gt;Hi zikercn! You&#39;ve successfully authenticated&lt;/code&gt;&lt;/p&gt;
&lt;h4 id=&#34;把生成的公钥添加到coding账户&#34;&gt;把生成的公钥添加到Coding账户：&lt;/h4&gt;
&lt;p&gt;点击右上角的头像，选择&lt;a href=&#34;https://coding.net/user/account/setting/basic&#34;&gt;个人设置&lt;/a&gt;，在左侧选择&lt;a href=&#34;https://coding.net/user/account/setting/keys&#34;&gt;SSH公钥&lt;/a&gt;，&lt;br&gt;
点击&lt;code&gt;新增公钥&lt;/code&gt;添加公钥&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCo4DP.jpg&#34; alt=&#34;eCo4DP.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h3 id=&#34;配置_configyml&#34;&gt;配置&lt;code&gt;_config.yml&lt;/code&gt;&lt;/h3&gt;
&lt;p&gt;您可以在&lt;code&gt;_config.yml&lt;/code&gt;中修改大部分的&lt;a href=&#34;https://hexo.io/zh-cn/docs/configuration&#34;&gt;配置&lt;/a&gt; 。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCDLcQ.jpg&#34; alt=&#34;eCDLcQ.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
复制SSH地址：&lt;code&gt;git@github.com:zikercn/zikercn.github.io.git&lt;/code&gt;&lt;br&gt;
打开本地Hexo博客目录，用编辑器打开&lt;code&gt;_config.yml&lt;/code&gt;到最下面编辑&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/ePhMEF.jpg&#34; alt=&#34;ePhMEF.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
打开本地Hexo博客目录，右键打开&lt;code&gt;Git Bash&lt;/code&gt;,用下面的命名生成静态文件&lt;br&gt;
&lt;code&gt;$ hexo generate&lt;/code&gt;&lt;br&gt;
修改主题，把下载好的主题解压到&lt;strong&gt;themes&lt;/strong&gt;目录，修改&lt;code&gt;_config.yml&lt;/code&gt;，theme：名称与主题文件夹名称相同&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/ePgDaj.jpg&#34; alt=&#34;ePgDaj.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
修改好主题后重新生成静态页面，本地预览看看，没有问题就可以云部署了&lt;br&gt;
&lt;code&gt;$ hexo generate&lt;/code&gt;&lt;br&gt;
&lt;code&gt;$ hexo server&lt;/code&gt;&lt;br&gt;
其他&lt;code&gt;permalink: /posts/:title/&lt;/code&gt;&lt;/p&gt;
&lt;h3 id=&#34;部署到github&#34;&gt;部署到Github&lt;/h3&gt;
&lt;p&gt;&lt;code&gt;$ hexo deploy&lt;/code&gt;&lt;br&gt;
&lt;code&gt;ERROR Deployer not found: git&lt;/code&gt;&lt;br&gt;
如果现实上面的提示就需要下载deployer,如果在&lt;br&gt;
&lt;code&gt;$ npm install hexo-deployer-git --save&lt;/code&gt;&lt;/p&gt;
&lt;h3 id=&#34;hexo日常管理相关命令&#34;&gt;Hexo日常管理相关命令：&lt;/h3&gt;
&lt;pre&gt;&lt;code&gt;$ hexo new [layout] &amp;lt;title&amp;gt;
$ hexo new 文章名
$ hexo new page 页面名
$ hexo clean
$ hexo generate
$ hexo deploy
&lt;/code&gt;&lt;/pre&gt;
">Hexo静态博客本地部署+Github云部署</a>

      <div class="item">
        <a class="result-title" href="https://zikercn.github.io/post/shi-yong-travis-ci-zi-dong-hua-bu-shu-hexo-jing-tai-bo-ke-dao-github/"" data-c="
          &lt;p&gt;本地搭建好hexo静态博客后 &lt;a href=&#34;&#34;&gt;不会参考另一篇&lt;/a&gt;&lt;/p&gt;
&lt;h4 id=&#34;在github上创建token&#34;&gt;在Github上创建token&lt;/h4&gt;
&lt;p&gt;点击右上角你的头像，选择&lt;a href=&#34;https://github.com/settings/profile&#34;&gt;&lt;strong&gt;Settings&lt;/strong&gt;&lt;/a&gt;，在左侧栏选择&lt;a href=&#34;https://github.com/settings/apps&#34;&gt;&lt;strong&gt;Developer settings&lt;/strong&gt;&lt;/a&gt;选择&lt;a href=&#34;https://github.com/settings/tokens&#34;&gt;&lt;strong&gt;Personal access tokens&lt;/strong&gt;&lt;/a&gt;，点击&lt;a href=&#34;https://github.com/settings/tokens/new&#34;&gt;Generate new token&lt;/a&gt;创建一个新的token，名称随便填，只勾选第一项&lt;strong&gt;repo&lt;/strong&gt;即可，点击下方&lt;strong&gt;Generate token&lt;/strong&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCDjns.jpg&#34; alt=&#34;eCDjns.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
把生成的一串token复制保存起来一会要用。&lt;br&gt;
&lt;code&gt;a08ee50a6ae24debedb3944b8c565111068a6697&lt;/code&gt;&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCDOXj.jpg&#34; alt=&#34;eCDOXj.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h4 id=&#34;在github上创建pages仓库&#34;&gt;在Github上创建Pages仓库&lt;/h4&gt;
&lt;p&gt;点击右上角的&lt;strong&gt;＋&lt;/strong&gt; 选择&lt;a href=&#34;https://github.com/new&#34;&gt; New repository&lt;/a&gt;，&lt;br&gt;
仓库名取固定格式&lt;code&gt;你的用户名.github.io&lt;/code&gt;,其他不变，点&lt;strong&gt;Create repository&lt;/strong&gt;创建&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/22/eCDLcQ.jpg&#34; alt=&#34;eCDLcQ.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h2 id=&#34;配置travis-ci&#34;&gt;配置Travis CI&lt;/h2&gt;
&lt;p&gt;&lt;img src=&#34;https://avatars3.githubusercontent.com/oa/1508?s=100&amp;amp;u=bf603d782b6026ffb9d2d665d34c3a4d7192e260&amp;amp;v=4&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;a href=&#34;https://www.travis-ci.org/&#34;&gt;Travis CI&lt;/a&gt; https://www.travis-ci.org/&lt;br&gt;
Travis CI 提供的是持续集成服务（Continuous Integration，简称 CI）。它绑定 Github 上面的项目，只要有新的代码，就会自动抓取。然后，提供一个运行环境，执行测试，完成构建，还能部署到服务器。&lt;br&gt;
持续集成指的是只要代码有变更，就自动运行构建和测试，反馈运行结果。确保符合预期以后，再将新代码&amp;quot;集成&amp;quot;到主干。&lt;br&gt;
持续集成的好处在于，每次代码的小幅变更，就能看到运行结果，从而不断累积小的变更，而不是在开发周期结束时，一下子合并一大块代码。&lt;br&gt;
Travis CI 只支持 Github，不支持其他代码托管服务。&lt;br&gt;
&lt;img src=&#34;http://www.ruanyifeng.com/blogimg/asset/2017/bg2017121901.png&#34; alt=&#34;Travis CI&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
1、首先打开&lt;a href=&#34;https://www.travis-ci.org/&#34;&gt;Travis CI&lt;/a&gt;官网，点击右上角的&lt;strong&gt;Sign in with GitHub&lt;/strong&gt;，使用&lt;strong&gt;Github&lt;/strong&gt;账号登录&lt;strong&gt;Travis CI&lt;/strong&gt;。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/21/eCuRV1.jpg&#34; alt=&#34;eCuRV1.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
Travis 会列出 Github 上面你的所有仓库，以及你所属于的组织。此时，选择你需要 Travis 帮你构建的仓库，打开仓库旁边的开关。一旦激活了一个仓库，Travis 会监听这个仓库的所有变化。&lt;br&gt;
&lt;img src=&#34;https://s2.ax1x.com/2019/07/21/eCugbR.jpg&#34; alt=&#34;eCugbR.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h3 id=&#34;新建travisyml&#34;&gt;新建.travis.yml&lt;/h3&gt;
&lt;p&gt;Travis 要求项目的根目录下面，必须有一个.travis.yml文件。这是配置文件，指定了 Travis 的行为。该文件必须保存在 Github 仓库里面，一旦代码仓库有新的 Commit，Travis 就会去找这个文件，执行里面的命令。&lt;br&gt;
这个文件采用 YAML 格式。下面是一个最简单的 Python 项目的.travis.yml文件。&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;language: python
script: true
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;上面代码中，设置了两个字段。language字段指定了默认运行环境，这里设定使用 Python 环境。script字段指定要运行的脚本，script: true表示不执行任何脚本，状态直接设为成功。&lt;br&gt;
Travis 默认提供的运行环境，请参考&lt;a href=&#34;https://docs.travis-ci.com/user/languages&#34;&gt;官方文档&lt;/a&gt; 。目前一共支持31种语言，以后还会不断增加。&lt;/p&gt;
">使用Travis CI自动化部署hexo静态博客到Github</a>
      </div>
